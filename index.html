<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma de Vídeos</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
    }

    .topo {
      background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
      padding: 32px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .topo h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .topo p {
      color: #dbeafe;
    }

    .container {
      max-width: 1400px;
      margin: 30px auto;
      padding: 0 16px 40px;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }

    h2,
    h3 {
      margin-bottom: 16px;
    }

    .grid1 {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #ffffff;
      outline: none;
      font-size: 15px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .acoes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
      background: #2563eb;
      color: #ffffff;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .msg {
      margin-top: 14px;
      color: #93c5fd;
      word-break: break-word;
    }

    .lista-videos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 16px;
    }

    .video-card {
      background: #081225;
      border: 1px solid #1f2937;
      border-radius: 18px;
      overflow: hidden;
      min-width: 0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      height: 220px;
      background: #000000;
      overflow: hidden;
      cursor: pointer;
    }

    .video-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000000;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.28);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .video-thumb:hover .video-overlay {
      opacity: 1;
    }

    .play-circle {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      transform: scale(0.95);
      transition: transform 0.25s ease;
    }

    .video-thumb:hover .play-circle {
      transform: scale(1);
    }

    .play-triangle {
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 18px solid #ffffff;
      margin-left: 4px;
    }

    .video-info {
      padding: 16px 16px 18px;
      background: linear-gradient(to bottom, #081225, #0b1730);
    }

    .video-card h4 {
      color: #ffffff;
      font-size: 22px;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .video-card p {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.5;
    }

    hr {
      border: none;
      border-top: 1px solid #233047;
      margin: 24px 0;
    }

    .vazio {
      color: #94a3b8;
    }

    @media (max-width: 1200px) {
      .lista-videos {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 900px) {
      .lista-videos {
        grid-template-columns: repeat(2, 1fr);
      }

      .video-thumb {
        height: 210px;
      }
    }

    @media (max-width: 600px) {
      .lista-videos {
        grid-template-columns: 1fr;
      }

      .topo h1 {
        font-size: 26px;
      }

      .video-thumb {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <h1>Plataforma de Vídeos</h1>
    <p>Upload, visualização e organização de vídeos</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Enviar Vídeo</h2>

      <div class="grid1">
        <input type="text" id="tituloVideo" placeholder="Título do vídeo" />
        <textarea id="descricaoVideo" placeholder="Descrição do vídeo"></textarea>
        <input type="file" id="arquivoVideo" accept="video/*" />
      </div>

      <div class="acoes">
        <button id="btnUpload">Adicionar vídeo</button>
      </div>

      <p id="uploadMsg" class="msg"></p>

      <hr />

      <h3>Meus Vídeos</h3>
      <div id="listaVideos" class="lista-videos"></div>
    </section>
  </main>

  <script>
    const tituloVideo = document.getElementById("tituloVideo");
    const descricaoVideo = document.getElementById("descricaoVideo");
    const arquivoVideo = document.getElementById("arquivoVideo");
    const btnUpload = document.getElementById("btnUpload");
    const uploadMsg = document.getElementById("uploadMsg");
    const listaVideos = document.getElementById("listaVideos");

    let videos = [];

    btnUpload.addEventListener("click", function () {
      const titulo = tituloVideo.value.trim();
      const descricao = descricaoVideo.value.trim();
      const file = arquivoVideo.files[0];

      if (!titulo) {
        uploadMsg.textContent = "Informe o título do vídeo.";
        return;
      }

      if (!file) {
        uploadMsg.textContent = "Selecione um vídeo.";
        return;
      }

      const urlVideo = URL.createObjectURL(file);

      const novoVideo = {
        id: Date.now(),
        titulo: titulo,
        descricao: descricao || "Sem descrição",
        nomeArquivo: file.name,
        url: urlVideo
      };

      videos.unshift(novoVideo);

      tituloVideo.value = "";
      descricaoVideo.value = "";
      arquivoVideo.value = "";
      uploadMsg.textContent = "Vídeo adicionado com sucesso.";

      renderizarVideos();
    });

    function renderizarVideos() {
      if (videos.length === 0) {
        listaVideos.innerHTML = '<p class="vazio">Nenhum vídeo adicionado ainda.</p>';
        return;
      }

      let html = "";

      videos.forEach(function (video) {
        html += `
          <div class="video-card">
            <div class="video-thumb" onclick="togglePlay(${video.id})">
              <video id="video-${video.id}" preload="metadata">
                <source src="${video.url}" type="video/mp4">
                Seu navegador não suporta vídeo.
              </video>

              <div class="video-overlay">
                <div class="play-circle">
                  <div class="play-triangle"></div>
                </div>
              </div>
            </div>

            <div class="video-info">
              <h4>${escapeHtml(video.titulo)}</h4>
              <p>${escapeHtml(video.descricao)}</p>
            </div>
          </div>
        `;
      });

      listaVideos.innerHTML = html;
    }

    function togglePlay(id) {
      const video = document.getElementById("video-" + id);

      if (!video) return;

      if (video.paused) {
        pausarTodos();
        video.play();
      } else {
        video.pause();
      }
    }

    function pausarTodos() {
      const todos = document.querySelectorAll(".video-thumb video");
      todos.forEach(function (video) {
        video.pause();
      });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    renderizarVideos();
  </script>
</body>
</html>
